# Bash config for StackCube-v1 Diffusion Policy + 4D map training.
# Usage:
#   source baselines/diffusion_policy/configs/stackcube_map4d_train.conf
#   python baselines/diffusion_policy/train_rgbd.py "${TRAIN_ARGS[@]}"

RUN_NAME="stackcube_map4d_gt_dp_50k_seed1"
LOG_FILE="outputs/train_logs/${RUN_NAME}.log"

TRAIN_ARGS=(
  --exp-name "${RUN_NAME}"
  --seed 1
  --env-id StackCube-v1
  --demo-path /inspire/hdd/project/robot-dna/baojiachun-CZXS25130063/zehao/4dmap/dataset/ManiSkill/StackCube-v1/motionplanning/StackCube.rgb+depth+segmentation.pd_ee_delta_pose.physx_cpu.h5
  --num-demos 100
  --control-mode pd_ee_delta_pos
  --sim-backend physx_cpu
  --obs-mode rgb+depth
  --max-episode-steps 100
  --total-iters 400000
  --batch-size 64
  --obs-horizon 2
  --act-horizon 2
  --pred-horizon 4
  --lr 0.0001
  --use-map4d
  --map4d-source maniskill_gt
  --map4d-task-name StackCube-v1
  --map4d-future-horizon 3
  --map4d-num-objects 3
  --map4d-feature-dim 128
  --map4d-node-dim 128
  --map4d-relation-dim 64
  --map4d-temporal-dim 128
  --map4d-pose-weight 1.0
  --map4d-penetration-weight 0.1
  --map4d-kinematic-weight 0.1
  --map4d-pointcloud-weight 0.1
  --map4d-pointcloud-samples 64
  --map4d-pointcloud-margin 0.002
  --log-freq 100
  --eval-freq 10000
  --num-eval-episodes 100
  --num-eval-envs 10
  --save-freq 10000
  --num-dataload-workers 0
  --no-track
  --no-capture-video
)
